<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Airports Current Time (Premium Dashboard)</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for sleek icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-day-bg: rgba(255, 255, 255, 0.9);
            --card-day-text: #0f172a;
            --card-day-muted: #64748b;
            --card-day-accent: #f59e0b; /* Golden Sun */
            --card-day-glow: 0 8px 30px rgba(245, 158, 11, 0.15);

            --card-night-bg: rgba(15, 23, 42, 0.65);
            --card-night-text: #f8fafc;
            --card-night-muted: #94a3b8;
            --card-night-accent: #38bdf8; /* Mystic Moon Blue */
            --card-night-glow: 0 8px 30px rgba(56, 189, 248, 0.15);

            /* Special Premium Accent for UTC Aviation Baseline */
            --card-utc-bg: linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(30, 41, 59, 0.85) 100%);
            --card-utc-accent: #10b981; /* Emerald Green for Radar/Instrument feel */
            --card-utc-glow: 0 8px 30px rgba(16, 185, 129, 0.2);

            --font-main: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            color: #f8fafc;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Style */
        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .title-container {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            justify-content: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #94a3b8;
            margin-top: 10px;
            font-size: 1rem;
            font-weight: 400;
        }

        /* Controls: Search and Filters */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-out;
        }

        @media (min-width: 768px) {
            .controls {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        /* Search Box */
        .search-wrapper {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
        }

        .search-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1.1rem;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #f8fafc;
            font-family: var(--font-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            background: rgba(30, 41, 59, 0.9);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none; /* Hide scrollbar for clean look */
        }

        .filter-tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: #f8fafc;
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .tab-btn.active {
            color: #0f172a;
            background: #f8fafc;
            border-color: #f8fafc;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            animation: fadeInUp 1s ease-out;
        }

        /* Card Component with Glassmorphism */
        .card {
            border-radius: 24px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease, border-color 0.4s ease;
            cursor: pointer;
            height: 230px;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        /* Dynamic Styling: Daytime Card */
        .card.daytime {
            background: var(--card-day-bg);
            color: var(--card-day-text);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .card.daytime:hover {
            box-shadow: var(--card-day-glow);
            border-color: rgba(245, 158, 11, 0.4);
        }

        .card.daytime .region {
            background: rgba(15, 23, 42, 0.05);
            color: var(--card-day-muted);
        }

        .card.daytime .city {
            color: var(--card-day-muted);
        }

        .card.daytime .time-display {
            color: #0f172a;
        }

        .card.daytime .time-sec {
            color: #ef4444; /* Vivid red for daytime seconds accent */
        }

        .card.daytime .status-icon {
            color: var(--card-day-accent);
            text-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }

        .card.daytime .coords-wrapper {
            border-top: 1px solid rgba(15, 23, 42, 0.08);
            color: var(--card-day-muted);
        }

        /* Dynamic Styling: Nighttime Card */
        .card.nighttime {
            background: var(--card-night-bg);
            color: var(--card-night-text);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card.nighttime:hover {
            box-shadow: var(--card-night-glow);
            border-color: rgba(56, 189, 248, 0.4);
            background: rgba(15, 23, 42, 0.75);
        }

        .card.nighttime .region {
            background: rgba(255, 255, 255, 0.08);
            color: var(--card-night-muted);
        }

        .card.nighttime .city {
            color: var(--card-night-muted);
        }

        .card.nighttime .time-display {
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .card.nighttime .time-sec {
            color: #fbbf24; /* Warm yellow for night seconds accent */
        }

        .card.nighttime .status-icon {
            color: var(--card-night-accent);
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .card.nighttime .coords-wrapper {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--card-night-muted);
        }

        /* Special Pinned UTC Card Styling */
        .card.utc-card {
            background: var(--card-utc-bg);
            color: #f8fafc;
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .card.utc-card:hover {
            box-shadow: var(--card-utc-glow);
            border-color: var(--card-utc-accent);
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95) 0%, rgba(30, 41, 59, 0.95) 100%);
        }

        .card.utc-card .region {
            background: rgba(16, 185, 129, 0.15);
            color: var(--card-utc-accent);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .card.utc-card .city {
            color: #94a3b8;
        }

        .card.utc-card .time-display {
            color: var(--card-utc-accent);
            text-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }

        .card.utc-card .time-sec {
            color: #f59e0b; /* Amber warning color for precision zulu seconds */
        }

        .card.utc-card .status-icon {
            color: var(--card-utc-accent);
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .card.utc-card .coords-wrapper {
            border-top: 1px solid rgba(16, 185, 129, 0.15);
            color: #94a3b8;
        }

        /* Card Header Elements */
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .meta-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .region {
            align-self: flex-start;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 4px 10px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .airport-name {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.25;
            letter-spacing: -0.01em;
        }

        .city {
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        /* Status Icon (Sun/Moon/Globe Animation) */
        .status-icon {
            font-size: 1.8rem;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover .status-icon {
            transform: scale(1.15) rotate(15deg);
        }

        /* Time Section */
        .time-wrapper {
            margin: auto 0 12px 0;
        }

        .time-display {
            font-family: var(--font-mono);
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            transition: color 0.5s;
            display: flex;
            align-items: baseline;
            gap: 2px;
        }

        .time-sec {
            font-size: 1.1rem;
            font-weight: 500;
            margin-left: 3px;
        }

        /* Card Footer - Coordinates */
        .coords-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            padding-top: 14px;
            transition: border-color 0.5s, color 0.5s;
        }

        .coords-wrapper i {
            font-size: 0.85rem;
        }

        /* Empty State */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 24px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            color: #94a3b8;
        }

        .no-results i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #64748b;
        }

        /* CSS Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Smooth responsive adjustments */
        @media (max-width: 480px) {
            body {
                padding: 20px 10px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .card {
                padding: 20px;
                height: 210px;
            }
            .time-display {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="title-container">
            <h1><i class="fa-solid fa-plane-departure"></i> World Airports Board</h1>
        </div>
        <p>Premium Real-Time Flight Deck Clock & Ambient Day/Night Status</p>
    </header>

    <!-- Controls Area -->
    <div class="controls">
        <!-- Live Filter Tabs -->
        <div class="filter-tabs" id="filter-tabs">
            <button class="tab-btn active" data-filter="all">All Regions</button>
            <button class="tab-btn" data-filter="Japan">Japan</button>
            <button class="tab-btn" data-filter="Asia">Asia</button>
            <button class="tab-btn" data-filter="Europe">Europe</button>
            <button class="tab-btn" data-filter="North America">North America</button>
            <button class="tab-btn" data-filter="Middle East">Middle East</button>
            <button class="tab-btn" data-filter="Oceania">Oceania</button>
            <button class="tab-btn" data-filter="Latin America">Latin America</button>
        </div>

        <!-- Search Bar -->
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search-input" class="search-input" placeholder="Search airport, city, or IATA code...">
        </div>
    </div>

    <!-- Active Airports Grid -->
    <div class="grid" id="airports-grid">
        <!-- Rendered dynamically by JS -->
    </div>
</div>

<script>
    // List of 20 major airports with their respective IANA time zones
    const airports = [
        { area: 'Japan', name: 'Haneda Airport (HND)', city: 'Tokyo / Japan', coords: '35.5494° N / 139.7798° E', tz: 'Asia/Tokyo' },
        { area: 'Japan', name: 'Narita International Airport (NRT)', city: 'Chiba / Japan', coords: '35.7720° N / 140.3929° E', tz: 'Asia/Tokyo' },
        { area: 'Japan', name: 'Kansai International Airport (KIX)', city: 'Osaka / Japan', coords: '34.4320° N / 135.2304° E', tz: 'Asia/Tokyo' },
        { area: 'Asia', name: 'Incheon International Airport (ICN)', city: 'Seoul / South Korea', coords: '37.4602° N / 126.4407° E', tz: 'Asia/Seoul' },
        { area: 'Asia', name: 'Taiwan Taoyuan International (TPE)', city: 'Taipei / Taiwan', coords: '25.0797° N / 121.2342° E', tz: 'Asia/Taipei' },
        { area: 'Asia', name: 'Hong Kong International (HKG)', city: 'Hong Kong / China', coords: '22.3080° N / 113.9185° E', tz: 'Asia/Hong_Kong' },
        { area: 'Asia', name: 'Singapore Changi Airport (SIN)', city: 'Singapore', coords: '1.3644° N / 103.9915° E', tz: 'Asia/Singapore' },
        { area: 'Asia', name: 'Suvarnabhumi Airport (BKK)', city: 'Bangkok / Thailand', coords: '13.6926° N / 100.7501° E', tz: 'Asia/Bangkok' },
        { area: 'Oceania', name: 'Sydney Airport (SYD)', city: 'Sydney / Australia', coords: '33.9461° S / 151.1772° E', tz: 'Australia/Sydney' },
        { area: 'Middle East', name: 'Dubai International (DXB)', city: 'Dubai / UAE', coords: '25.2532° N / 55.3657° E', tz: 'Asia/Dubai' },
        { area: 'Middle East', name: 'Hamad International (DOH)', city: 'Doha / Qatar', coords: '25.2611° N / 51.5651° E', tz: 'Asia/Qatar' },
        { area: 'Europe', name: 'London Heathrow Airport (LHR)', city: 'London / UK', coords: '51.4700° N / 0.4543° W', tz: 'Europe/London' },
        { area: 'Europe', name: 'Paris Charles de Gaulle (CDG)', city: 'Paris / France', coords: '49.0097° N / 2.5479° E', tz: 'Europe/Paris' },
        { area: 'Europe', name: 'Frankfurt Airport (FRA)', city: 'Frankfurt / Germany', coords: '50.0379° N / 8.5622° E', tz: 'Europe/Berlin' },
        { area: 'North America', name: 'John F. Kennedy Airport (JFK)', city: 'New York / USA', coords: '40.6398° N / 73.7781° W', tz: 'America/New_York' },
        { area: 'North America', name: 'Los Angeles International (LAX)', city: 'Los Angeles / USA', coords: '33.9416° N / 118.4085° W', tz: 'America/Los_Angeles' },
        { area: 'North America', name: 'Atlanta Hartsfield-Jackson (ATL)', city: 'Atlanta / USA', coords: '33.6407° N / 84.4277° W', tz: 'America/New_York' },
        { area: 'North America', name: 'O\'Hare International Airport (ORD)', city: 'Chicago / USA', coords: '41.9742° N / 87.9073° W', tz: 'America/Chicago' },
        { area: 'Latin America', name: 'Mexico City International (MEX)', city: 'Mexico City / Mexico', coords: '19.4362° N / 99.0721° W', tz: 'America/Mexico_City' },
        { area: 'Latin America', name: 'Guarulhos International (GRU)', city: 'São Paulo / Brazil', coords: '23.4356° S / 46.4731° W', tz: 'America/Sao_Paulo' }
    ];

    let currentFilter = 'all';
    let searchQuery = '';

    const grid = document.getElementById('airports-grid');
    const searchInput = document.getElementById('search-input');
    const tabContainer = document.getElementById('filter-tabs');

    // Render card list based on active filters
    function renderBoard() {
        // Filter the airport array
        const filtered = airports.filter(airport => {
            const matchesTab = currentFilter === 'all' || airport.area === currentFilter;
            const matchesSearch = airport.name.toLowerCase().includes(searchQuery) ||
                                  airport.city.toLowerCase().includes(searchQuery) ||
                                  airport.area.toLowerCase().includes(searchQuery);
            return matchesTab && matchesSearch;
        });

        // HTML generation for cards
        let cardsHTML = '';

        // Render the special UTC Baseline Card (always shown first as reference)
        // Only skip rendering UTC card if the user searched for something specific that doesn't match "utc"
        const matchesUTCSearch = 'utc'.includes(searchQuery) || 'coordinated universal time'.includes(searchQuery) || 'zulu'.includes(searchQuery);
        if (currentFilter === 'all' || matchesUTCSearch) {
            cardsHTML += `
                <div class="card utc-card" id="card-utc">
                    <div class="card-top">
                        <div class="meta-info">
                            <span class="region">Standard Baseline</span>
                            <h2 class="airport-name">Zulu Time (UTC)</h2>
                            <span class="city">Coordinated Universal Time</span>
                        </div>
                        <div class="status-icon" id="icon-utc">
                            <i class="fa-solid fa-earth-americas"></i>
                        </div>
                    </div>
                    <div class="time-wrapper">
                        <div class="time-display" id="time-utc">
                            --:--<span class="time-sec">--</span>
                        </div>
                    </div>
                    <div class="coords-wrapper">
                        <i class="fa-solid fa-compass"></i>
                        <span>0.0000° N / 0.0000° E (Prime Meridian)</span>
                    </div>
                </div>
            `;
        }

        // Handle empty search scenarios
        if (filtered.length === 0 && !matchesUTCSearch) {
            grid.innerHTML = `
                <div class="no-results">
                    <i class="fa-regular fa-folder-open"></i>
                    <p>No airports found matching "${searchQuery}" in this region.</p>
                </div>
            `;
            return;
        }

        // Append filtered airport cards
        cardsHTML += filtered.map((airport) => {
            const globalIndex = airports.findIndex(a => a.name === airport.name);
            return `
                <div class="card" id="card-${globalIndex}">
                    <div class="card-top">
                        <div class="meta-info">
                            <span class="region">${airport.area}</span>
                            <h2 class="airport-name">${airport.name}</h2>
                            <span class="city">${airport.city}</span>
                        </div>
                        <div class="status-icon" id="icon-${globalIndex}">
                            <i class="fa-solid fa-circle-notch fa-spin"></i>
                        </div>
                    </div>
                    <div class="time-wrapper">
                        <div class="time-display" id="time-${globalIndex}">
                            --:--<span class="time-sec">--</span>
                        </div>
                    </div>
                    <div class="coords-wrapper">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>${airport.coords}</span>
                    </div>
                </div>
            `;
        }).join('');

        grid.innerHTML = cardsHTML;

        // Trigger dynamic clocks immediately
        updateClock();
    }

    // Dynamic Time & Day-Night Theme Evaluator
    function updateClock() {
        const now = new Date();
        
        // 1. Update the Special Pinned UTC Clock
        const utcTimeCell = document.getElementById('time-utc');
        const utcCardElement = document.getElementById('card-utc');
        const utcIconElement = document.getElementById('icon-utc');
        
        if (utcTimeCell && utcCardElement) {
            try {
                // Get segment values directly from UTC
                const utcHours = String(now.getUTCHours()).padStart(2, '0');
                const utcMinutes = String(now.getUTCMinutes()).padStart(2, '0');
                const utcSeconds = String(now.getUTCSeconds()).padStart(2, '0');
                
                utcTimeCell.innerHTML = `${utcHours}:${utcMinutes}<span class="time-sec">${utcSeconds}</span>`;
                
                // Keep the dynamic world icon spinning gently or static
                const utcHourNum = now.getUTCHours();
                const isUTCNight = utcHourNum >= 18 || utcHourNum < 6;
                
                // Show standard earth icon but subtly change tooltip or indicator if needed
                utcIconElement.innerHTML = `<i class="fa-solid fa-earth-americas"></i>`;
            } catch (e) {
                utcTimeCell.textContent = 'Error';
            }
        }

        // 2. Update all local airport clocks
        airports.forEach((airport, index) => {
            const timeCell = document.getElementById(`time-${index}`);
            const cardElement = document.getElementById(`card-${index}`);
            const iconElement = document.getElementById(`icon-${index}`);

            if (!timeCell || !cardElement) return;

            try {
                // Get formatted segments of target timezone
                const timeStr = now.toLocaleTimeString('ja-JP', {
                    timeZone: airport.tz,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });

                // Splitting seconds for high-contrast design
                const parts = timeStr.split(':');
                if (parts.length === 3) {
                    timeCell.innerHTML = `${parts[0]}:${parts[1]}<span class="time-sec">${parts[2]}</span>`;
                } else {
                    timeCell.textContent = timeStr;
                }

                // Get target hour as Integer to dynamically compute status
                const hourStr = now.toLocaleTimeString('ja-JP', {
                    timeZone: airport.tz,
                    hour: 'numeric',
                    hour12: false
                });
                const currentHour = parseInt(hourStr, 10);

                // Define local day status based on hour (18:00 to 05:59 is night)
                const isNight = currentHour >= 18 || currentHour < 6;

                if (isNight) {
                    if (!cardElement.classList.contains('nighttime')) {
                        cardElement.classList.add('nighttime');
                        cardElement.classList.remove('daytime');
                        iconElement.innerHTML = `<i class="fa-solid fa-moon"></i>`;
                    }
                } else {
                    if (!cardElement.classList.contains('daytime')) {
                        cardElement.classList.add('daytime');
                        cardElement.classList.remove('nighttime');
                        iconElement.innerHTML = `<i class="fa-solid fa-sun"></i>`;
                    }
                }

            } catch (e) {
                timeCell.textContent = 'Error';
            }
        });
    }

    // Tab Filter Actions
    tabContainer.addEventListener('click', (e) => {
        if (!e.target.classList.contains('tab-btn')) return;

        // Reset active states
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');

        currentFilter = e.target.getAttribute('data-filter');
        renderBoard();
    });

    // Handle interactive searching
    searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase().trim();
        renderBoard();
    });

    // Initialize System Loop
    renderBoard();
    setInterval(updateClock, 1000);
</script>
</body>
</html>
